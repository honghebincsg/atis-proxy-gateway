name: ATIS API Proxy
run-name: Proxy Request for ATIS

on:
  workflow_dispatch:
    inputs:
      api_path:
        description: 'ATIS 接口路径 (例: api/metar/xxxx)'
        required: true
        type: string

jobs:
  request_atis:
    runs-on: ubuntu-latest
    steps:
      - name: Install curl
        run: sudo apt-get update && sudo apt-get install -y curl

      - name: Request ATIS.info API (Browser Spoof)
        id: http_req
        run: |
          TARGET_URL="https://atis.info/${{ github.event.inputs.api_path }}"
          # 带完整浏览器请求头，跟随重定向，模拟真实浏览器
          curl -s -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/128.0.0.0 Safari/537.36" \
            -H "Accept: application/json,text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
            -H "Accept-Language: en-US,en;q=0.9" \
            -H "Accept-Encoding: gzip, deflate, br" \
            -H "Referer: https://atis.info/" \
            -H "Sec-Fetch-Dest: document" \
            -H "Sec-Fetch-Mode: navigate" \
            -H "Sec-Fetch-Site: same-origin" \
            -H "Sec-Fetch-User: ?1" \
            "$TARGET_URL" > response.json

          # 获取 HTTP 状态码
          echo "status=$(curl -s -o /dev/null -w "%{http_code}" -L \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/128.0.0.0 Safari/537.36" \
            "$TARGET_URL")" >> $GITHUB_OUTPUT

      - name: Upload response as artifact
        uses: actions/upload-artifact@v4
        with:
          name: atis-response
          path: response.json

      - name: Print Status Code
        run: |
          echo "HTTP Status Code: ${{ steps.http_req.outputs.status }}"
