name: ATIS API Proxy
run-name: Proxy Request for ATIS

on:
  workflow_dispatch:
    inputs:
      api_path:
        description: 'ATIS 接口路径 (例: api/KLAX)'
        required: true
        type: string

jobs:
  request_atis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 方案A：缓存 npm + Playwright Chromium 二进制 + node_modules，避免每次重装（27s -> ~2s）
      # 升级 playwright 或 Chromium 版本时，请把 key 末尾 v1 升到 v2，否则会沿用旧缓存
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/ms-playwright
            node_modules
          key: ${{ runner.os }}-atis-deps-v1
          restore-keys: |
            ${{ runner.os }}-atis-deps-

      # 关键修复2：必须装系统依赖，否则 ubuntu-latest 上 Chromium 起不来
      # 注意：缓存命中时 npx 会跳过 Chromium 下载，但 --with-deps 仍会按需补装系统库（无缓存、<10s）
      - name: Install Playwright & Chromium (with deps)
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      # 关键修复1/3/4/5/6：真正执行 node、stealth 反指纹、响应拦截抓 JSON、等数据、容错
      - name: Run browser request to bypass CF
        env:
          TARGET_URL: "https://atis.info/${{ github.event.inputs.api_path }}"
        run: |
          cat > fetch.js << 'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          (async () => {
            const url = process.env.TARGET_URL;
            let browser;
            try {
              browser = await chromium.launch({
                headless: true,
                args: ['--disable-blink-features=AutomationControlled']
              });
              const context = await browser.newContext({
                userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/128.0.0.0 Safari/537.36',
                locale: 'en-US'
              });
              const page = await context.newPage();
              await page.addInitScript(() => {
                try { Object.defineProperty(navigator, 'webdriver', { get: () => undefined }); } catch (e) {}
              });
              const jsonBodies = [];
              page.on('response', async (resp) => {
                const ct = (resp.headers()['content-type'] || '').toLowerCase();
                if (ct.includes('application/json')) {
                  try { jsonBodies.push(await resp.text()); } catch (e) {}
                }
              });
              try {
                await page.goto(url, { timeout: 60000, waitUntil: 'domcontentloaded' });
                await page.waitForFunction(
                  () => /ATIS|KLAX|METAR/i.test((document.body && document.body.innerText) || ''),
                  { timeout: 60000 }
                );
              } catch (e) {
                console.error('等待数据超时/失败:', e.message);
              }
              const dataJson = jsonBodies.filter(b => /airport|KLAX|ATIS|metar/i.test(b)).pop() || jsonBodies.pop();
              if (dataJson) {
                fs.writeFileSync('response.json', dataJson);
                console.log('已写入 response.json（来自拦截的 JSON 响应，长度 ' + dataJson.length + '）');
              } else {
                const txt = await page.evaluate(() => document.body.innerText).catch(() => '');
                fs.writeFileSync('response.json', txt || '');
                console.log('未捕获到 JSON 响应，已写入页面文本（可能被 CF 拦截）');
              }
            } catch (e) {
              console.error('脚本异常:', e.message);
              if (!fs.existsSync('response.json')) fs.writeFileSync('response.json', '');
            } finally {
              if (browser) await browser.close().catch(() => {});
            }
          })();
          EOF
          node fetch.js

      - name: Upload response as artifact
        uses: actions/upload-artifact@v4
        with:
          name: atis-response
          path: response.json

      - name: Print done
        run: echo "Task finished"
